name: CI

on:
  push:
    branches: [ main, master, test-macos-build ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10
        
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Typecheck
      run: pnpm run typecheck
      continue-on-error: true # allow typecheck to fail temporarily if there are existing errors, remove this later
      
    - name: Lint
      run: pnpm run lint
      continue-on-error: true # allow lint to fail temporarily if there are existing errors, remove this later
      
    - name: Build
      run: pnpm run build
